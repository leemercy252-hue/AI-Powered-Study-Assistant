        onApprove: async function(data, actions){
          try{
            var cap = await fetch('/capture-order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({orderID:data.orderID})});
            var cres = await cap.json();
            if(cres && !cres.error){
              ctx.addToast('Payment successful — Thank you!','success');
              setShowPay(false);try{localStorage.setItem('sm_subscribed','pro');}catch(e){}
              return;
            }
          }catch(e){console.error('Server capture failed',e);} 
          return actions.order.capture().then(function(details){
            ctx.addToast('Payment successful — Thank you!','success');
            setShowPay(false);try{localStorage.setItem('sm_subscribed','pro');}catch(e){}
          });
        },
        onError:function(err){ctx.addToast('Payment failed','error');}
      }).render('#paypal-buttons');
    }catch(ex){console.error(ex);ctx.addToast('Error rendering PayPal button','error');}
  }

  async function payWithFlutterwave(amount){
    try{
      var tx_ref = 'sm_'+Date.now();
      var resp = await fetch('/flutterwave/create-payment',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({amount:amount,currency:currency==='eur'?'EUR':(currency==='usd'?'NGN':'NGN'),tx_ref:tx_ref,redirectUrl:window.location.origin + '/flutterwave/verify',email:(ctx.user && ctx.user.email)?ctx.user.email:''})});
      var j = await resp.json();
      if(j && j.data && j.data.link){
        window.location = j.data.link;
      }else{
        console.error('Flutterwave response',j);
        ctx.addToast('Failed to start Flutterwave payment','error');
      }
    }catch(e){console.error(e);ctx.addToast('Flutterwave request failed','error');}
  }

  return e('div',{className:"af space-y-8"},
    e('div',{className:"text-center max-w-2xl mx-auto mb-8"},
      e('h1',{className:"text-3xl font-bold mb-2"},"Simple, Transparent Pricing"),
      e('p',{className:"text-gray-500 dark:text-gray-400"},"No hidden fees. Cancel anytime. All plans access the full StudyMind experience."),
      e('div',{className:"flex justify-center gap-3 mt-6"},
        e('button',{onClick:function(){setCurrency('usd');},className:"px-4 py-2 rounded-xl text-sm font-semibold transition "+(currency==='usd'?"bg-primary-600 text-white shadow-md":"bg-gray-100 dark:bg-white/5 text-gray-600")},e('span',null,"USD ($)")),
        e('button',{onClick:function(){setCurrency('eur');},className:"px-4 py-2 rounded-xl text-sm font-semibold transition "+(currency==='eur'?"bg-primary-600 text-white shadow-md":"bg-gray-100 dark:bg-white/5 text-gray-600")},e('span',null,"EUR (€)"))
      )
    ),
    e('div',{className:"grid md:grid-cols-2 gap-6 max-w-3xl mx-auto mb-8"},
      plans.map(function(pl,i){
        return e('div',{key:i,className:"relative bg-white dark:bg-surface-800 rounded-2xl p-8 border "+(pl.b?"border-primary-500 shadow-lg shadow-primary-500/20":"border-gray-200 dark:border-gray-700/40")+(pl.b?" transform md:scale-105":"")},
          pl.b?e('div',{className:"absolute -top-4 left-1/2 -translate-x-1/2 bg-gradient-to-r from-primary-600 to-primary-500 text-white px-4 py-1 rounded-full text-xs font-bold"},"RECOMMENDED"):null,
          e('h2',{className:"text-2xl font-bold mb-2"},pl.n),
          e('p',{className:"text-sm text-gray-500 mb-4"},pl.desc),
          e('div',{className:"mb-6"},
            e('span',{className:"text-4xl font-extrabold"},pl.p===0?"Free":currency==='usd'?'$'+pl.p.toFixed(2):'€'+pl.p.toFixed(2)),
            pl.p>0?e('span',{className:"text-gray-500 text-sm ml-2"},"/month"):null
          ),
          validated&&pl.p>0?e('div',{className:"mb-4 p-3 bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-400 rounded-lg text-xs font-medium"},e('i',{className:"fas fa-check-circle mr-2"}),"40% student discount applied!"):null,
          e('button',{onClick:function(){if(pl.p>0){setPayAmount(pl.p);setShowPay(true);}else{ctx.addToast('Free plan activated!','success');}},className:"w-full py-2.5 rounded-xl text-sm font-semibold transition "+(pl.b?"bg-gradient-to-r from-primary-600 to-primary-500 text-white shadow-lg hover:shadow-xl":"bg-gray-100 dark:bg-white/5 text-gray-700 dark:text-gray-300 hover:bg-gray-200")},pl.p>0?'Upgrade Now':'Start Free'),
          e('div',{className:"mt-6 space-y-3"},
            pl.f.map(function(feat,j){
              return e('div',{key:j,className:"flex items-center gap-2 text-sm"},
                e('i',{className:"fas fa-check text-primary-500 w-4"}),
                feat
              );
            })
          )
        );
      })
    ),
    e('div',{className:"bg-white dark:bg-surface-800 rounded-2xl p-8 border border-gray-200 dark:border-gray-700/40 shadow-sm max-w-2xl mx-auto mb-8"},
      e('h3',{className:"text-lg font-bold mb-4"},"Student Discount - 40% OFF"),
      e('p',{className:"text-gray-600 dark:text-gray-400 text-sm mb-4"},"Have a .edu email? Verify your student status and get Pro for just "+( currency==='usd'?'$'+discPrice.toFixed(2):'€'+discPriceEur.toFixed(2))+"/month."),
      !validated?e('div',{className:"flex gap-2"},
        e('input',{type:"email",value:email,onChange:function(ev){setEmail(ev.target.value);},placeholder:"your.name@university.edu",className:"flex-1 px-4 py-2.5 bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-gray-700 rounded-xl text-sm"}),
        e('button',{onClick:verifyEdu,className:"px-5 py-2.5 bg-primary-600 text-white rounded-xl text-sm font-semibold hover:bg-primary-700 transition"},"Verify")
      ):e('div',{className:"p-3 bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-400 rounded-lg text-sm font-medium"},e('i',{className:"fas fa-check-circle mr-2"}),"✓ Student verified!")
    ),
    e('div',{className:"bg-white dark:bg-surface-800 rounded-2xl p-8 border border-gray-200 dark:border-gray-700/40 shadow-sm"},
      e('h3',{className:"text-lg font-bold mb-6 text-center"},"Full Feature Comparison"),
      e('div',{className:"overflow-x-auto"},
        e('table',{className:"w-full text-sm"},
          e('thead',null,
            e('tr',{className:"border-b border-gray-200 dark:border-gray-700"},
              e('th',{className:"text-left py-3 px-4 font-semibold"},"Feature"),
              e('th',{className:"text-center py-3 px-4 font-semibold"},"Free"),
              e('th',{className:"text-center py-3 px-4 font-semibold"},"Pro")
            )
          ),
          e('tbody',null,
            features.map(function(feat,i){
              return e('tr',{key:i,className:"border-b border-gray-100 dark:border-gray-700/50 hover:bg-gray-50 dark:hover:bg-white/5"},
                e('td',{className:"py-3 px-4"},feat.t),
                e('td',{className:"text-center py-3 px-4"},feat.free?e('i',{className:"fas fa-check text-emerald-500"}):e('i',{className:"fas fa-times text-gray-300"})),
                e('td',{className:"text-center py-3 px-4"},feat.pro?e('i',{className:"fas fa-check text-primary-500"}):e('i',{className:"fas fa-times text-gray-300"}))

        e('div',{className:"text-center"},e('i',{className:"fas fa-euro-sign text-2xl mb-2 block"}),e('span',{className:"text-sm"},"Auto EUR Convert"))
      ),
      e('p',{className:"text-sm opacity-90"},"Funds received in EUR. No hidden fees. Same low price worldwide.")
    )
  );
}

// App
function App(){
  var stored=null;
  try{var s2=localStorage.getItem('sm_u');if(s2)stored=JSON.parse(s2);}catch(ex){}
  var darkSt=true;
  try{var d2=localStorage.getItem('sm_d');if(d2!==null)darkSt=JSON.parse(d2);else darkSt=window.matchMedia('(prefers-color-scheme:dark)').matches;}catch(ex){}

  var u=useState(stored),user=u[0],setUser=u[1];
  var dk=useState(darkSt),dark=dk[0],setDark=dk[1];
  var dc=useState(DOCS),docs=dc[0],setDocs=dc[1];
  var cd=useState(CARDS),cards=cd[0],setCards=cd[1];
  var qz=useState(QUIZZES),quizzes=qz[0],setQuizzes=qz[1];
  var cr=useState('dashboard'),cur=cr[0],setCur=cr[1];
  var cl=useState(true),col=cl[0],setCol=cl[1];
  var ts=useState(null),toast=ts[0],setToast=ts[1];

  var addToast=useCallback(function(msg,type){setToast({message:msg,type:type||'info',id:Date.now()});},[]);

  useEffect(function(){try{localStorage.setItem('sm_u',JSON.stringify(user));}catch(ex){}},[user]);
  useEffect(function(){try{localStorage.setItem('sm_d',JSON.stringify(dark));}catch(ex){}if(dark)document.documentElement.classList.add('dark');else document.documentElement.classList.remove('dark');},[dark]);
  useEffect(function(){var el=document.getElementById('boot');if(el){el.classList.add('done');setTimeout(function(){el.style.display='none';},700);}},[]);

  var ctx=useMemo(function(){return{user:user,setUser:setUser,dark:dark,setDark:setDark,docs:docs,setDocs:setDocs,cards:cards,setCards:setCards,quizzes:quizzes,setQuizzes:setQuizzes,addToast:addToast};},[user,dark,docs,cards,quizzes,addToast]);

  if(!user)return e(Ctx.Provider,{value:ctx},e(AuthPage,null));

  var pages={dashboard:Dashboard,upload:UploadPage,documents:DocsPage,summarize:SummarizePage,flashcards:FlashcardsPage,quiz:QuizPage,chat:ChatPage,progress:ProgressPage,pricing:PricingPage,profile:ProfilePage};
  var Page=pages[cur]||Dashboard;

  return e(Ctx.Provider,{value:ctx},
    e('div',{className:"flex min-h-screen"},
      e(Sidebar,{cur:cur,setCur:setCur,col:col,setCol:setCol}),
      e('div',{className:"flex-1 transition-all duration-300 "+(col?"lg:ml-20":"lg:ml-64")},
        e(TopBar,{setCol:setCol}),
        e('main',{className:"p-4 lg:p-6 max-w-7xl mx-auto"},e(Page,{setCur:setCur}))
      )
    ),
    toast?e(Toast,{key:toast.id,message:toast.message,type:toast.type,onClose:function(){setToast(null);}}):null
  );
}

// Mount
try{
  ReactDOM.createRoot(document.getElementById('root')).render(e(App,null));
}catch(ex){
  var el=document.getElementById('bmsg');if(el){el.textContent='React Error: '+ex.message;el.style.color='red';}
}

})();
</script>
</body>
</html>
