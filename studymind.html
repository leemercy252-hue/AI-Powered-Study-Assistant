<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;overflow-x:hidden}
#boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#f8fafb;z-index:9999;transition:opacity .6s}
#boot.done{opacity:0;pointer-events:none}
#boot .ring{width:48px;height:48px;border:4px solid #ccfbf1;border-top-color:#0d9488;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.dark ::-webkit-scrollbar-thumb{background:#334155}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideR{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes blob{0%,100%{border-radius:60% 40% 30% 70%/60% 30% 70% 40%}50%{border-radius:30% 60% 70% 40%/50% 60% 30% 60%}}
.af{animation:fadeIn .5s ease both}.afr{animation:slideR .3s ease both}.ab{animation:blob 8s ease-in-out infinite}.afl{animation:float 3s ease-in-out infinite}
.flip-card{perspective:1000px}.flip-inner{transition:transform .6s;transform-style:preserve-3d;position:relative}.flip-inner.flipped{transform:rotateY(180deg)}.flip-front,.flip-back{backface-visibility:hidden;position:absolute;inset:0}.flip-back{transform:rotateY(180deg)}
.glass{backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.lc2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
input:focus,textarea:focus,select:focus{outline:none;box-shadow:0 0 0 3px rgba(13,148,136,.2)}
.dark input:focus,.dark textarea:focus,.dark select:focus{box-shadow:0 0 0 3px rgba(20,184,166,.25)}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body class="bg-surface-50 dark:bg-surface-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">
<div id="boot"><div style="text-align:center"><div class="ring" style="margin:0 auto 16px"></div><div style="font-weight:700;font-size:18px;color:#0d9488">StudyMind</div><div id="boot-msg" style="font-size:13px;color:#94a3b8;margin-top:4px">Loading...</div></div></div>
<div id="root"></div>

<script type="module">
import htm from 'https://esm.sh/htm@3.1.1';
const html = htm.bind(React.createElement);
const {useState,useEffect,useRef,useContext,createContext,useMemo,useCallback}=React;

/* ── Data ── */
const DOCS=[
  {id:'d1',name:'Introduction to Machine Learning',type:'pdf',size:'4.2 MB',date:'2024-12-01',cat:'Computer Science'},
  {id:'d2',name:'Organic Chemistry - Reaction Mechanisms',type:'pdf',size:'3.8 MB',date:'2024-11-28',cat:'Chemistry'},
  {id:'d3',name:'Data Structures - Trees and Graphs',type:'docx',size:'2.1 MB',date:'2024-11-25',cat:'Computer Science'},
  {id:'d4',name:'Modern European History 1815-1914',type:'txt',size:'1.5 MB',date:'2024-11-20',cat:'History'},

const CARDS=[
  {id:'f1',did:'d1',front:'What is the bias-variance tradeoff?',back:'The balance between fitting training data (low bias) and generalizing to unseen data (low variance). More complexity reduces bias but increases variance.',saved:true},
  {id:'f2',did:'d1',front:'Supervised vs unsupervised learning?',back:'Supervised uses labeled data to predict outcomes. Unsupervised finds patterns in unlabeled data.',saved:true},

  {id:'f4',did:'d3',front:'BFS vs DFS?',back:'BFS finds shortest paths in unweighted graphs. DFS is better for topological sorting and cycle detection.',saved:true},
  {id:'f5',did:'d5',front:'When use trig substitution?',back:'When integrand contains sqrt(a²-x²), sqrt(a²+x²), or sqrt(x²-a²).',saved:false},
  {id:'f6',did:'d6',front:'Common cognitive distortions in CBT?',back:'All-or-nothing thinking, overgeneralization, mental filter, disqualifying positives, jumping to conclusions, magnification, emotional reasoning, should statements, labeling, personalization.',saved:true},
  {id:'f7',did:'d1',front:'What is overfitting?',back:'Model learns noise in training data, performs well on training but poorly on test data. Prevention: cross-validation, regularization, more data, early stopping, dropout.',saved:false},
  {id:'f8',did:'d4',front:'Significance of Congress of Vienna?',back:'Reshaped Europe after Napoleon, restored monarchies, established balance of power, suppressed nationalist movements.',saved:true}
];
const QUIZZES=[
  {id:'q1',did:'d1',title:'Machine Learning Fundamentals',saved:true,score:80,date:'2024-12-02',qs:[
    {id:'q1a',q:'Which type of learning uses labeled training data?',opts:['Unsupervised','Reinforcement','Supervised','Self-supervised'],ans:2,ua:2},
    {id:'q1b',q:'What happens when a model overfits?',opts:['Generalizes well','Learns noise','High bias','Underperforms on training'],ans:1,ua:1},
    {id:'q1c',q:'Which is NOT a regularization technique?',opts:['L1 Regularization','Dropout','Data Augmentation','Gradient Descent'],ans:3,ua:0},
    {id:'q1d',q:'Bias-variance tradeoff suggests:',opts:['More complexity increases both','Less complexity always better','Reducing bias often increases variance','They are independent'],ans:2,ua:2},
    {id:'q1e',q:'Which handles non-linear boundaries?',opts:['Linear Regression','Logistic Regression','SVM with RBF kernel','Naive Bayes'],ans:2,ua:2}
  ]},
  {id:'q2',did:'d2',title:'Organic Chemistry Reactions',saved:true,score:60,date:'2024-11-29',qs:[
    {id:'q2a',q:'SN2 reactions result in:',opts:['Racemization','Inversion of configuration','Retention','No change'],ans:1,ua:1},
    {id:'q2b',q:'What favors SN1 over SN2?',opts:['Strong nucleophile','Primary substrate','Tertiary substrate','Low temperature'],ans:2,ua:2},
    {id:'q2c',q:'E2 elimination requires:',opts:['Carbocation intermediate','Anti-periplanar geometry','Only weak base','Polar protic solvent'],ans:1,ua:0},
    {id:'q2d',q:'Curved arrow represents:',opts:['Nuclear decay','Electron pair movement','Photon emission','Vibration'],ans:1,ua:1},
    {id:'q2e',q:'Best solvent for SN1?',opts:['Acetone','Water','Hexane','Diethyl ether'],ans:1,ua:2}
  ]}
];
const SDATA={weekly:[120,95,140,80,160,110,135],scores:[75,80,60,90,85,95],subjects:{'CS':35,'Chem':20,'Math':18,'Hist':12,'Psych':15},streak:12,hours:840,cards:156,quizzes:24};

/* ── Context ── */
const Ctx=createContext();

/* ── Toast ── */
function Toast({message,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[onClose]);
  const bg=type==='success'?'bg-emerald-500':type==='error'?'bg-red-500':'bg-teal-600';
  const ic=type==='success'?'fa-check-circle':type==='error'?'fa-exclamation-circle':'fa-info-circle';
  return html`<div className="afr fixed top-6 right-6 z-[100] ${bg} text-white px-5 py-3 rounded-xl shadow-lg flex items-center gap-3 text-sm font-medium">
    <i className="fas ${ic}"></i><span>${message}</span>
    <button onClick=${onClose} className="ml-2 opacity-70 hover:opacity-100"><i className="fas fa-times"></i></button>
  </div>`;
}

/* ── Spinner ── */
function Spin({size}){
  const s=size==='sm'?'w-5 h-5':'w-8 h-8';
  return html`<div className="${s} rounded-full" style=${{borderWidth:3,borderStyle:'solid',borderColor:'#99f6e4',borderTopColor:'#0d9488',animation:'spin .8s linear infinite'}}/>`;
}

/* ── Type helpers ── */
const typeIcon=t=>t==='pdf'?'fa-file-pdf':t==='docx'?'fa-file-word':'fa-file-alt';
const typeCls=t=>t==='pdf'?'bg-red-100 dark:bg-red-900/20 text-red-500':t==='docx'?'bg-blue-100 dark:bg-blue-900/20 text-blue-500':'bg-gray-100 dark:bg-gray-800 text-gray-500';

/* ── Auth ── */
function AuthPage(){
  const{setUser}=useContext(Ctx);
  const[mode,setMode]=useState('login');
  const[form,setForm]=useState({name:'',email:'',pw:'',pw2:''});
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState('');

  function submit(e){
    e.preventDefault();setErr('');
    if(mode==='signup'&&form.pw!==form.pw2){setErr('Passwords do not match');return;}
    if(!form.email||!form.pw){setErr('Please fill in all fields');return;}
    setLoading(true);
    setTimeout(()=>{setUser({name:form.name||form.email.split('@')[0],email:form.email,joined:'2024-09-01'});setLoading(false);},1200);
  }
  function uf(k,v){setForm(Object.assign({},form,{[k]:v}));}
  function go(m){setMode(m);setErr('');}

  return html`<div className="min-h-screen flex">
    <div className="hidden lg:flex lg:w-1/2 bg-gradient-to-br from-primary-600 via-primary-700 to-teal-800 relative overflow-hidden items-center justify-center p-12">
      <div className="absolute top-20 -left-20 w-72 h-72 bg-primary-400/20 rounded-full blur-3xl ab"></div>
      <div className="absolute bottom-20 -right-10 w-96 h-96 bg-accent-500/10 rounded-full blur-3xl ab" style=${{animationDelay:'4s'}}></div>
      <div className="relative z-10 max-w-md">
        <div className="flex items-center gap-3 mb-8">
          <div className="w-12 h-12 rounded-2xl bg-white/20 flex items-center justify-center"><i className="fas fa-brain text-white text-xl"></i></div>
          <span className="text-2xl font-bold text-white">StudyMind</span>
        </div>
        <h1 className="text-4xl font-extrabold text-white leading-tight mb-4">Your AI-Powered Study Companion</h1>
        <p className="text-primary-100 text-lg leading-relaxed mb-8">Upload study materials and let AI create summaries, flashcards, and quizzes.</p>
        <div className="space-y-4">
          ${[{i:'fa-compress-alt',t:'Instant note summarization'},{i:'fa-clone',t:'Auto-generated flashcards'},{i:'fa-question-circle',t:'AI-powered quizzes'},{i:'fa-comments',t:'Chat with your documents'}].map((f,j)=>html`
            <div key=${j} className="flex items-center gap-3 text-primary-100 af" style=${{animationDelay:j*150+'ms'}}>
              <div className="w-8 h-8 rounded-lg bg-white/10 flex items-center justify-center"><i className="fas ${f.i} text-sm text-accent-400"></i></div>
              <span className="text-sm font-medium">${f.t}</span>
            </div>
          `)}
        </div>
      </div>
    </div>
    <div className="flex-1 flex items-center justify-center p-6 bg-surface-50 dark:bg-surface-900">
      <div className="w-full max-w-md af">
        <div className="lg:hidden flex items-center gap-3 mb-8 justify-center">
          <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-500 to-primary-700 flex items-center justify-center shadow-lg shadow-primary-500/25"><i className="fas fa-brain text-white"></i></div>
          <span className="text-xl font-bold bg-gradient-to-r from-primary-600 to-primary-500 bg-clip-text text-transparent">StudyMind</span>
        </div>
        <h2 className="text-2xl font-bold mb-1">${mode==='login'?'Welcome back':mode==='signup'?'Create your account':'Reset password'}</h2>
        <p className="text-gray-500 dark:text-gray-400 mb-8 text-sm">
          ${mode==='login'?"Don't have an account?":mode==='signup'?'Already have an account?':'Remember your password?'}
          <button onClick=${()=>go(mode==='login'?'signup':'login')} className="text-primary-600 dark:text-primary-400 font-semibold ml-1 hover:underline">${mode==='login'?'Sign up':'Log in'}</button>
        </p>
        ${err&&html`<div className="mb-4 p-3 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 rounded-xl text-sm"><i className="fas fa-exclamation-circle mr-2"></i>${err}</div>`}
        <form onSubmit=${submit} className="space-y-4">
          ${mode==='signup'&&html`<div>
            <label className="block text-sm font-medium mb-1.5 text-gray-700 dark:text-gray-300">Full Name</label>
            <div className="relative"><i className="fas fa-user absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="text" value=${form.name} onChange=${e=>uf('name',e.target.value)} className="w-full pl-10 pr-4 py-2.5 bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-gray-700 rounded-xl text-sm" placeholder="John Doe" required/></div>
          </div>`}
          <div>
            <label className="block text-sm font-medium mb-1.5 text-gray-700 dark:text-gray-300">Email</label>
            <div className="relative"><i className="fas fa-envelope absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="email" value=${form.email} onChange=${e=>uf('email',e.target.value)} className="w-full pl-10 pr-4 py-2.5 bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-gray-700 rounded-xl text-sm" placeholder="you@university.edu" required/></div>
          </div>
          ${mode!=='forgot'&&html`<div>
            <label className="block text-sm font-medium mb-1.5 text-gray-700 dark:text-gray-300">Password</label>
            <div className="relative"><i className="fas fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="password" value=${form.pw} onChange=${e=>uf('pw',e.target.value)} className="w-full pl-10 pr-4 py-2.5 bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-gray-700 rounded-xl text-sm" placeholder="Min. 8 characters" required/></div>
          </div>`}
          ${mode==='signup'&&html`<div>
            <label className="block text-sm font-medium mb-1.5 text-gray-700 dark:text-gray-300">Confirm Password</label>
            <div className="relative"><i className="fas fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="password" value=${form.pw2} onChange=${e=>uf('pw2',e.target.value)} className="w-full pl-10 pr-4 py-2.5 bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-gray-700 rounded-xl text-sm" placeholder="Repeat password" required/></div>
          </div>`}
          ${mode==='login'&&html`<div className="flex justify-end"><button type="button" onClick=${()=>go('forgot')} className="text-sm text-primary-600 dark:text-primary-400 font-semibold hover:underline">Forgot password?</button></div>`}
          <button type="submit" disabled=${loading} className="w-full py-2.5 bg-gradient-to-r from-primary-600 to-primary-500 hover:from-primary-700 hover:to-primary-600 text-white rounded-xl font-semibold text-sm shadow-lg shadow-primary-500/25 transition disabled:opacity-60 flex items-center justify-center gap-2">
            ${loading?html`<${Spin} size="sm" />`:mode==='login'?'Log In':mode==='signup'?'Create Account':'Send Reset Link'}
          </button>
        </form>
        ${mode==='login'&&html`<div className="mt-6">
          <div className="relative flex items-center justify-center my-4"><div className="absolute inset-0 flex items-center"><div className="w-full border-t border-gray-200 dark:border-gray-700"></div></div><span className="relative bg-surface-50 dark:bg-surface-900 px-3 text-xs text-gray-400">or continue with</span></div>
          <div className="grid grid-cols-2 gap-3">
            <button onClick=${()=>{setLoading(true);setTimeout(()=>setUser({name:'Student',email:'student@google.com',joined:'2024-09-01'}),800;}} className="flex items-center justify-center gap-2 py-2.5 border border-gray-200 dark:border-gray-700 rounded-xl text-sm font-medium hover:bg-gray-50 dark:hover:bg-white/5 transition"><i className="fab fa-google text-red-500"></i>Google</button>
            <button onClick=${()=>{setLoading(true);setTimeout(()=>setUser({name:'Student',email:'student@uni.edu',joined:'2024-09-01'}),800;}} className="flex items-center justify-center gap-2 py-2.5 border border-gray-200 dark:border-gray-700 rounded-xl text-sm font-medium hover:bg-gray-50 dark:hover:bg-white/5 transition"><i className="fas fa-university text-primary-600"></i>University</button>
          </div>
        </div>`}
      </div>
    </div>
  </div>`;
}

/* ── Sidebar ── */
function Sidebar({cur,setCur,col,setCol}){
  const{dark,setDark}=useContext(Ctx);
  const items=[{id:'dashboard',i:'fa-th-large',l:'Dashboard'},{id:'upload',i:'fa-cloud-upload-alt',l:'Upload'},{id:'documents',i:'fa-folder-open',l:'Documents'},{id:'summarize',i:'fa-compress-alt',l:'Summarize'},{id:'flashcards',i:'fa-clone',l:'Flashcards'},{id:'quiz',i:'fa-question-circle',l:'Quiz'},{id:'chat',i:'fa-comments',l:'AI Chat'},{id:'progress',i:'fa-chart-line',l:'Progress'},{id:'profile',i:'fa-user-circle',l:'Profile'}];
  return html`<React.Fragment>
    ${!col&&html`<div className="lg:hidden fixed inset-0 bg-black/40 z-40" onClick=${()=>setCol(true)}/>`}
    <aside className="fixed top-0 left-0 h-full z-50 transition-all duration-300 flex flex-col bg-white dark:bg-surface-800 border-r border-gray-200 dark:border-gray-700/50 ${col?'-translate-x-full lg:translate-x-0 lg:w-20':'translate-x-0 w-64'}">
      <div className="flex items-center h-16 border-b border-gray-100 dark:border-gray-700/50 shrink-0 ${col?'lg:justify-center':'px-6'}">
        <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-primary-500 to-primary-700 flex items-center justify-center shadow-md shadow-primary-500/25"><i className="fas fa-brain text-white text-sm"></i></div>
        ${!col&&html`<span className="ml-3 text-lg font-bold bg-gradient-to-r from-primary-600 to-primary-500 bg-clip-text text-transparent">StudyMind</span>`}
      </div>
      <nav className="flex-1 py-4 px-3 space-y-1 overflow-y-auto">
        ${items.map(it=>{
          const a=cur===it.id;
          return html`<button key=${it.id} onClick=${()=>{setCur(it.id);setCol(true);}}
            className="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all ${a?'bg-primary-50 dark:bg-primary-900/30 text-primary-700 dark:text-primary-400 shadow-sm':'text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-white/5'} ${col?'lg:justify-center lg:px-0':''}">
            <i className="fas ${it.i} w-5 text-center ${a?'text-primary-600 dark:text-primary-400':'text-gray-400 dark:text-gray-500'}"></i>
            ${!col&&html`<span>${it.l}</span>`}
          </button>`;
        })}
      </nav>
      <div className="p-4 border-t border-gray-100 dark:border-gray-700/50 shrink-0 ${col?'lg:flex lg:justify-center':''}">
        <button onClick=${()=>setDark(!dark)} className="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-white/5 transition">
          <i className="fas ${dark?'fa-sun text-amber-400':'fa-moon'} w-5 text-center"></i>
          ${!col&&html`<span>${dark?'Light Mode':'Dark Mode'}</span>`}
        </button>
      </div>
    </aside>
  </React.Fragment>`;
}

/* ── TopBar ── */
function TopBar({setCol}){
  const{dark,setDark,user}=useContext(Ctx);
  const[s,setS]=useState('');
  return html`<header className="sticky top-0 z-30 h-16 bg-white/80 dark:bg-surface-800/80 glass border-b border-gray-200/60 dark:border-gray-700/40 flex items-center justify-between px-4 lg:px-6">
    <div className="flex items-center gap-3">
      <button onClick=${()=>setCol(c=>!c)} className="w-9 h-9 rounded-xl hover:bg-gray-100 dark:hover:bg-white/5 flex items-center justify-center text-gray-500 transition" aria-label="Menu"><i className="fas fa-bars text-sm"></i></button>
      <div className="hidden sm:flex items-center bg-gray-100 dark:bg-white/5 rounded-xl px-3 py-2 w-64 lg:w-80">
        <i className="fas fa-search text-gray-400 text-xs mr-2"></i>
        <input value=${s} onChange=${e=>setS(e.target.value)} placeholder="Search documents..." className="bg-transparent text-sm w-full outline-none placeholder:text-gray-400 dark:placeholder:text-gray-500"/>
      </div>
    </div>
    <div className="flex items-center gap-2">
      <button onClick=${()=>setDark(!dark)} className="w-9 h-9 rounded-xl hover:bg-gray-100 dark:hover:bg-white/5 flex items-center justify-center text-gray-500 transition" aria-label="Toggle theme"><i className="fas ${dark?'fa-sun text-amber-400':'fa-moon'}"></i></button>
      <button className="w-9 h-9 rounded-xl hover:bg-gray-100 dark:hover:bg-white/5 flex items-center justify-center text-gray-500 transition relative" aria-label="Notifications"><i className="fas fa-bell text-sm"></i><span className="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span></button>
      <div className="w-8 h-8 rounded-full bg-gradient-to-br from-primary-400 to-primary-600 flex items-center justify-center text-white text-xs font-bold ml-1 shadow-md shadow-primary-500/20">${user?user.name.charAt(0):'S'}</div>
    </div>
  </header>`;
}

/* ── Dashboard ── */
function Dashboard({setCur}){
  const{dark}=useContext(Ctx);
  const r1=useRef(null),r2=useRef(null),r3=useRef(null);
  const c1=useRef(null),c2=useRef(null),c3=useRef(null);

  useEffect(()=>{
    if(!r1.current)return;
    if(c1.current)c1.current.destroy();
    const ctx=r1.current.getContext('2d');
    const g=ctx.createLinearGradient(0,0,0,250);

/* ── Upload ── */
function UploadPage(){
  const ctx=useContext(Ctx);
  const[drag,setDrag]=useState(false);
  const[uping,setUping]=useState(false);
  const[prog,setProg]=useState(0);

  function handleF(files){
    if(!files||!files.length)return;
    setUping(true);setProg(0);
    const iv=setInterval(()=>setProg(p=>{if(p>=100){clearInterval(iv);return 100}return p+Math.random()*15;}),200);
    setTimeout(()=>{clearInterval(iv);setProg(100);
      ctx.setDocs(prev=>[{id:'d'+Date.now(),name:files[0].name,type:files[0].name.split('.').pop(),size:(files[0].size/1024/1024).toFixed(1)+' MB',date:new Date().toISOString().split('T')[0],cat:'General'},...prev]);
      setUping(false);ctx.addToast('Document uploaded successfully!','success');
    },2500);
  }

  return html`<div className="af max-w-2xl mx-auto space-y-6">
    <div><h1 className="text-2xl font-bold">Upload Study Material</h1><p className="text-gray-500 dark:text-gray-400 text-sm mt-1">Upload PDF, DOCX, or TXT files for AI processing.</p></div>
    <div className="relative border-2 border-dashed rounded-2xl p-12 text-center transition-all ${drag?'border-primary-500 bg-primary-50 dark:bg-primary-900/10 scale-[1.02]':'border-gray-300 dark:border-gray-600 hover:border-primary-400'}"
      onDragOver=${e=>{e.preventDefault();setDrag(true);}} onDragLeave=${()=>setDrag(false)} onDrop=${e=>{e.preventDefault();setDrag(false);handleF(e.dataTransfer.files);}}>
      <input type="file" accept=".pdf,.docx,.txt" className="absolute inset-0 opacity-0 cursor-pointer" onChange=${e=>handleF(e.target.files)}/>
      <div className="w-16 h-16 mx-auto rounded-2xl flex items-center justify-center mb-4 transition ${drag?'bg-primary-100 dark:bg-primary-900/30':'bg-gray-100 dark:bg-white/5'}"><i className="fas fa-cloud-upload-alt text-2xl ${drag?'text-primary-500':'text-gray-400'}"></i></div>
      <p className="font-semibold mb-1">${drag?'Drop your file here':'Drag and drop your files'}</p>
      <p className="text-sm text-gray-400">or click to browse. Supports PDF, DOCX, TXT (max 25 MB)</p>
    </div>
    ${uping&&html`<div className="bg-white dark:bg-surface-800 rounded-2xl p-5 border border-gray-100 dark:border-gray-700/40 shadow-sm">
      <div className="flex items-center justify-between mb-2"><span className="text-sm font-medium">Uploading...</span><span className="text-sm text-primary-600 dark:text-primary-400 font-semibold">${Math.min(Math.round(prog),100)}%</span></div>
      <div className="w-full h-2 bg-gray-100 dark:bg-white/5 rounded-full overflow-hidden"><div className="h-full bg-gradient-to-r from-primary-500 to-primary-400 rounded-full transition-all duration-300" style=${{width:Math.min(prog,100)+'%'}}/></div>
    </div>`}
    <div className="bg-white dark:bg-surface-800 rounded-2xl p-5 border border-gray-100 dark:border-gray-700/40 shadow-sm">
      <h3 className="font-semibold text-sm mb-3">Supported File Types</h3>
      <div className="grid grid-cols-3 gap-3">
        ${[{ext:'PDF',i:'fa-file-pdf',c:'text-red-500 bg-red-50 dark:bg-red-900/20'},{ext:'DOCX',i:'fa-file-word',c:'text-blue-500 bg-blue-50 dark:bg-blue-900/20'},{ext:'TXT',i:'fa-file-alt',c:'text-gray-500 bg-gray-50 dark:bg-gray-800'}].map(f=>html`<div key=${f.ext} className="flex flex-col items-center gap-2 p-4 rounded-xl ${f.c}"><i className="fas ${f.i} text-xl"></i><span className="text-xs font-bold">${f.ext}</span></div>`)}
      </div>
    </div>
  </div>`;
}

function SummarizePage(){
  const ctx=useContext(Ctx);
  const[sel,setSel]=useState('');
  const[sum,setSum]=useState('');
  const[loading,setLoading]=useState(false);

  function gen(){
    if(!sel){ctx.addToast('Please select a document first','error');return;}
    setLoading(true);setSum('');
    const doc=ctx.docs.find(d=>d.id===sel);
    const full='**Key Points from "'+doc.name+'":**\n\nThis document covers fundamental concepts in '+doc.cat+'. The main topics include:\n\n1. **Core Principles**: Foundational definitions and frameworks essential for advanced study.\n\n2. **Key Mechanisms**: Important processes described in detail, emphasizing their interactions.\n\n3. **Practical Applications**: Theoretical concepts connected to real-world use cases.\n\n4. **Critical Analysis**: Distinctions and comparisons between related concepts.\n\n5. **Study Recommendations**: Focus on understanding relationships rather than memorizing facts.';
    let idx=0;
    const iv=setInterval(()=>{setSum(full.slice(0,idx));idx+=3;if(idx>=full.length){setSum(full);clearInterval(iv);setLoading(false);ctx.addToast('Summary generated!','success');}},20);
  }

  return html`<div className="af max-w-3xl mx-auto space-y-6">
    <div><h1 className="text-2xl font-bold">AI Summarizer</h1><p className="text-gray-500 dark:text-gray-400 text-sm mt-1">Get concise summaries of your study materials.</p></div>

          <option value="">Choose a document...</option>
          ${ctx.docs.map(d=>html`<option key=${d.id} value=${d.id}>${d.name}</option>`)}

      </div>
      <button onClick=${gen} disabled=${loading} className="flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-primary-600 to-primary-500 text-white rounded-xl text-sm font-semibold shadow-lg shadow-primary-500/25 transition disabled:opacity-60">
        ${loading?html`<${Spin} size="sm" /><span>Generating...</span>`:html`<i className="fas fa-magic text-xs"></i>Generate Summary`}
      </button>
    </div>
    ${sum&&html`<div className="bg-white dark:bg-surface-800 rounded-2xl p-6 border border-gray-100 dark:border-gray-700/40 shadow-sm af">

        {id:'q'+Date.now()+'b',q:'What is the primary benefit of understanding these mechanisms?',opts:['Memorization of facts','Ability to predict and explain outcomes','Faster assignment completion','Avoiding further study'],ans:1},
        {id:'q'+Date.now()+'c',q:'Which best demonstrates mastery?',opts:['Reciting definitions','Applying concepts to novel scenarios','Copying examples','Highlighting passages'],ans:1},
        {id:'q'+Date.now()+'d',q:'When comparing approaches, consider:',opts:['Only the most popular','Their respective strengths and limitations','The one with fewest steps','The most recent only'],ans:1},
        {id:'q'+Date.now()+'e',q:'How does theory support practice?',opts:['It does not relate','It provides a framework for informed decisions','It replaces practice','It makes practice unnecessary'],ans:1}
      ]};
      ctx.setQuizzes(p=>[nq,...p]);setActive(nq);setCq(0);setAns({});setResults(false);
      setGening(false);ctx.addToast('Quiz generated!','success');
    },2200);
  }

  function submit(){
    let sc=0;active.qs.forEach(q=>{if(ans[q.id]===q.ans)sc++;});
    const pct=Math.round(sc/active.qs.length*100);
    const upd=Object.assign({},active,{score:pct,date:new Date().toISOString().split('T')[0],qs:active.qs.map(q=>Object.assign({},q,{ua:ans[q.id]}))});
    ctx.setQuizzes(p=>p.map(q=>q.id===upd.id?upd:q));
    setActive(upd);setResults(true);
    ctx.addToast('Quiz complete! Score: '+pct+'%','success');
  }

  const dq=savedOnly?ctx.quizzes.filter(q=>q.saved):ctx.quizzes;

  if(active&&!results){
    const q=active.qs[cq];
    return html`<div className="af max-w-2xl mx-auto space-y-6">
      <div className="flex items-center justify-between"><h2 className="text-lg font-bold">${active.title}</h2><span className="text-sm text-gray-500">${cq+1}/${active.qs.length}</span></div>
      <div className="w-full h-2 bg-gray-100 dark:bg-white/5 rounded-full overflow-hidden"><div className="h-full bg-gradient-to-r from-primary-500 to-primary-400 rounded-full transition-all" style=${{width:(cq+1)/active.qs.length*100+'%'}}/></div>
      <div className="bg-white dark:bg-surface-800 rounded-2xl p-6 border border-gray-100 dark:border-gray-700/40 shadow-sm">
        <p className="font-semibold mb-5">${q.q}</p>
        <div className="space-y-3">
          ${q.opts.map((opt,i)=>{
            const s=ans[q.id]===i;
            return html`<button key=${i} onClick=${()=>{const a=Object.assign({},ans);a[q.id]=i;setAns(a);}} className="w-full text-left px-4 py-3 rounded-xl border text-sm font-medium transition ${s?'border-primary-500 bg-primary-50 dark:bg-primary-900/20 text-primary-700 dark:text-primary-400':'border-gray-200 dark:border-gray-700 hover:border-primary-300 dark:hover:border-primary-600'}">
              <span className="inline-flex items-center justify-center w-6 h-6 rounded-lg mr-3 text-xs font-bold ${s?'bg-primary-600 text-white':'bg-gray-100 dark:bg-white/5 text-gray-500'}">${String.fromCharCode(65+i)}</span>${opt}
            </button>`;
          })}
        </div>
      </div>
      <div className="flex justify-between">
        <button onClick=${()=>setCq(Math.max(0,cq-1))} disabled=${cq===0} className="px-4 py-2.5 bg-white dark:bg-surface-800 border border-gray-200 dark:border-gray-700/40 rounded-xl text-sm font-medium disabled:opacity-30 transition">Previous</button>
        ${cq<active.qs.length-1?
          html`<button onClick=${()=>setCq(cq+1)} className="px-4 py-2.5 bg-primary-600 text-white rounded-xl text-sm font-semibold shadow-md shadow-primary-500/25 transition">Next</button>`:
          html`<button onClick=${submit} className="px-5 py-2.5 bg-gradient-to-r from-primary-600 to-primary-500 text-white rounded-xl text-sm font-semibold shadow-lg shadow-primary-500/25 transition">Submit Quiz</button>`
        }
      </div>
    </div>`;
  }

  if(active&&results){
    const sc=active.score;
    return html`<div className="af max-w-2xl mx-auto space-y-6">
      <div className="bg-white dark:bg-surface-800 rounded-2xl p-8 border border-gray-100 dark:border-gray-700/40 shadow-sm text-center">
        <div className="w-24 h-24 mx-auto rounded-full flex items-center justify-center mb-4 ${sc>=80?'bg-emerald-100 dark:bg-emerald-900/20':sc>=60?'bg-amber-100 dark:bg-amber-900/20':'bg-red-100 dark:bg-red-900/20'}">
          <span className="text-3xl font-bold ${sc>=80?'text-emerald-600':sc>=60?'text-amber-600':'text-red-600'}">${sc}%</span>
        </div>
        <h2 className="text-xl font-bold mb-1">${sc>=80?'Excellent Work!':sc>=60?'Good Effort!':'Keep Studying!'}</h2>
        <p className="text-gray-500 text-sm">You answered ${active.qs.filter(q=>q.ua===q.ans).length} of ${active.qs.length} correctly.</p>
        <div className="flex justify-center gap-3 mt-6">
          <button onClick=${()=>{setActive(null);setResults(false);}} className="px-5 py-2.5 bg-gray-100 dark:bg-white/5 rounded-xl text-sm font-medium transition">Back to Quizzes</button>
          <button onClick=${()=>{ctx.setQuizzes(p=>p.map(q=>q.id===active.id?Object.assign({},q,{saved:true}):q));ctx.addToast('Quiz saved!','success');}} className="px-5 py-2.5 bg-gradient-to-r from-primary-600 to-primary-500 text-white rounded-xl text-sm font-semibold shadow-lg shadow-primary-500/25 transition"><i className="fas fa-bookmark mr-2"></i>Save Quiz</button>
        </div>
      </div>
      <div className="space-y-3">
        ${active.qs.map(q=>{
          const ok=q.ua===q.ans;
          return html`<div key=${q.id} className="p-4 rounded-xl border ${ok?'border-emerald-200 dark:border-emerald-800/40 bg-emerald-50/50 dark:bg-emerald-900/10':'border-red-200 dark:border-red-800/40 bg-red-50/50 dark:bg-red-900/10'}">
            <div className="flex items-start gap-3">
              <span className="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold shrink-0 ${ok?'bg-emerald-500 text-white':'bg-red-500 text-white'}"><i className="fas ${ok?'fa-check':'fa-times'} text-xs"></i></span>
              <div><p className="text-sm font-medium mb-1">${q.q}</p>
              ${!ok&&html`<p className="text-xs text-gray-500">Your answer: ${q.opts[q.ua]||'None'} · Correct: <strong>${q.opts[q.ans]}</strong></p>`}</div>
            </div>
          </div>`;
        })}
      </div>
    </div>`;
  }

  return html`<div className="af max-w-3xl mx-auto space-y-6">
    <div><h1 className="text-2xl font-bold">Quizzes</h1><p className="text-gray-500 dark:text-gray-400 text-sm mt-1">Test your knowledge with AI-generated quizzes.</p></div>
    <div className="bg-white dark:bg-surface-800 rounded-2xl p-6 border border-gray-100 dark:border-gray-700/40 shadow-sm space-y-4">
      <div className="flex flex-col sm:flex-row gap-3">
        <select value=${sel} onChange=${e=>setSel(e.target.value)} className="flex-1 px-4 py-2.5 bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-gray-700 rounded-xl text-sm">
          <option value="">Select document...</option>
          ${ctx.docs.map(d=>html`<option key=${d.id} value=${d.id}>${d.name}</option>`)}
        </select>
        <button onClick=${gen} disabled=${gening} className="flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-amber-500 to-amber-400 text-white rounded-xl text-sm font-semibold shadow-lg shadow-amber-500/25 transition disabled:opacity-60">
          ${gening?html`<${Spin} size="sm" />`:html`<i className="fas fa-magic text-xs"></i>`}Generate Quiz
        </button>
      </div>
      <div className="flex gap-2">
        <button onClick=${()=>setSavedOnly(false)} className="px-3 py-1.5 rounded-lg text-xs font-semibold transition ${!savedOnly?'bg-primary-600 text-white':'bg-gray-100 dark:bg-white/5 text-gray-500'}">All Quizzes</button>
        <button onClick=${()=>setSavedOnly(true)} className="px-3 py-1.5 rounded-lg text-xs font-semibold transition ${savedOnly?'bg-primary-600 text-white':'bg-gray-100 dark:bg-white/5 text-gray-500'}">Saved Only</button>
      </div>
    </div>
    ${dq.length===0?html`<div className="text-center py-16"><i className="fas fa-question-circle text-4xl text-gray-300 dark:text-gray-600 mb-3 block"></i><p className="text-gray-400 text-sm">Generate a quiz to get started</p></div>`:
    html`<div className="space-y-3">
      ${dq.map((q,i)=>html`<div key=${q.id} className="bg-white dark:bg-surface-800 rounded-2xl p-5 border border-gray-100 dark:border-gray-700/40 shadow-sm hover:shadow-md transition af" style=${{animationDelay:i*60+'ms'}}>
        <div className="flex items-center justify-between">
          <div><h3 className="font-semibold text-sm">${q.title}</h3>
            <div className="flex items-center gap-3 mt-1">
              <span className="text-xs text-gray-400">${q.qs.length} questions</span>
              ${q.score!==undefined&&html`<span className="text-xs font-semibold ${q.score>=80?'text-emerald-500':q.score>=60?'text-amber-500':'text-red-500'}">Score: ${q.score}%</span>`}
              ${q.date&&html`<span className="text-xs text-gray-400">${q.date}</span>`}
            </div>
          </div>
          <div className="flex gap-2">
            <button onClick=${()=>{setActive(q);setCq(0);setAns({});setResults(false);}} className="px-3 py-1.5 bg-primary-50 dark:bg-primary-900/20 text-primary-600 dark:text-primary-400 rounded-lg text-xs font-semibold hover:bg-primary-100 dark:hover:bg-primary-900/40 transition">${q.score!==undefined?'Review':'Take Quiz'}</button>
            <button onClick=${()=>{ctx.setQuizzes(p=>p.map(x=>x.id===q.id?Object.assign({},x,{saved:!x.saved}):x));ctx.addToast(q.saved?'Quiz unsaved':'Quiz saved!','success');}} className="w-8 h-8 rounded-lg flex items-center justify-center transition ${q.saved?'text-amber-500 bg-amber-50 dark:bg-amber-900/20':'text-gray-400 bg-gray-50 dark:bg-white/5'}"><i className="fas fa-bookmark text-xs"></i></button>
          </div>
        </div>
      </div>`)}
    </div>`}
  </div>`;
}

/* ── Chat ── */
function ChatPage(){
  const ctx=useContext(Ctx);
  const[msgs,setMsgs]=useState([{role:'asst',content:'Hello! I can answer questions based on your uploaded documents. Select a document and ask me anything!'}]);
  const[inp,setInp]=useState('');
  const[typing,setTyping]=useState(false);
  const[sel,setSel]=useState('');
  const endRef=useRef(null);

  useEffect(()=>{if(endRef.current)endRef.current.scrollIntoView({behavior:'smooth'});},[msgs]);

  function send(){
    if(!inp.trim())return;
    setMsgs(p=>[...p,{role:'user',content:inp}]);setInp('');setTyping(true);
    const lo=inp.toLowerCase();
    let r='Based on the document, I can provide insights about key concepts, mechanisms, and applications. Could you ask a more specific question?';
    if(lo.indexOf('what')>=0)r='The document covers several key concepts fundamental to the subject. The main ideas revolve around core principles, their mechanisms, and practical applications.';
    else if(lo.indexOf('how')>=0)r='The processes described work through interconnected steps. Each builds on the previous one, and understanding the underlying mechanisms is crucial for grasping the overall workflow.';
    else if(lo.indexOf('why')>=0)r='Understanding these concepts is important because they form the foundation for more advanced topics. The practical applications demonstrate why mastering these fundamentals matters.';
    else if(lo.indexOf('compare')>=0||lo.indexOf('difference')>=0)r='The document highlights key differences and similarities between approaches. Each has strengths and limitations, and the choice depends on specific context and requirements.';
    else if(lo.indexOf('explain')>=0||lo.indexOf('describe')>=0)r='The core idea is that these concepts are interconnected and build upon each other. The document progressively introduces more complex ideas, connecting back to foundational principles.';
    const doc=ctx.docs.find(d=>d.id===sel);
    r='Based on "'+(doc?doc.name:'your document')+'":\n\n'+r;
    setTimeout(()=>{setMsgs(p=>[...p,{role:'asst',content:r}]);setTyping(false);},1500);
  }

  return html`<div className="af flex flex-col" style=${{height:'calc(100vh - 8rem)'}}>
    <div className="mb-4"><h1 className="text-2xl font-bold">AI Chat</h1><p className="text-gray-500 dark:text-gray-400 text-sm mt-1">Ask questions about your uploaded documents.</p></div>
    <div className="flex items-center gap-3 mb-4">
      <select value=${sel} onChange=${e=>setSel(e.target.value)} className="px-4 py-2 bg-white dark:bg-surface-800 border border-gray-200 dark:border-gray-700/40 rounded-xl text-sm">
        <option value="">Select a document...</option>
        ${ctx.docs.map(d=>html`<option key=${d.id} value=${d.id}>${d.name}</option>`)}
      </select>
    </div>
    <div className="flex-1 bg-white dark:bg-surface-800 rounded-2xl border border-gray-100 dark:border-gray-700/40 shadow-sm flex flex-col overflow-hidden min-h-0">
      <div className="flex-1 overflow-y-auto p-5 space-y-4">
        ${msgs.map((m,i)=>html`<div key=${i} className="flex ${m.role==='user'?'justify-end':'justify-start'} af">
          <div className="max-w-[80%] px-4 py-3 rounded-2xl text-sm leading-relaxed ${m.role==='user'?'bg-gradient-to-r from-primary-600 to-primary-500 text-white rounded-br-md':'bg-gray-100 dark:bg-white/5 text-gray-700 dark:text-gray-300 rounded-bl-md'}">
            ${m.role==='asst'&&html`<div className="flex items-center gap-2 mb-2"><div className="w-5 h-5 rounded-md bg-primary-100 dark:bg-primary-900/30 flex items-center justify-center"><i className="fas fa-brain text-primary-600 dark:text-primary-400 text-xs"></i></div><span className="text-xs font-semibold text-primary-600 dark:text-primary-400">StudyMind AI</span></div>`}
            <div className="whitespace-pre-wrap">${m.content}</div>
          </div>
        </div>`)}
        ${typing&&html`<div className="flex justify-start"><div className="bg-gray-100 dark:bg-white/5 px-4 py-3 rounded-2xl rounded-bl-md"><div className="flex gap-1"><span className="w-2 h-2 bg-gray-400 rounded-full afl"></span><span className="w-2 h-2 bg-gray-400 rounded-full afl" style=${{animationDelay:'0.15s'}}></span><span className="w-2 h-2 bg-gray-400 rounded-full afl" style=${{animationDelay:'0.3s'}}></span></div></div></div>`}
        <div ref=${endRef}/>
      </div>
      <div className="p-4 border-t border-gray-100 dark:border-gray-700/40">
        <form onSubmit=${e=>{e.preventDefault();send();}} className="flex gap-2">
          <input value=${inp} onChange=${e=>setInp(e.target.value)} placeholder="Ask about your documents..." className="flex-1 px-4 py-2.5 bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-gray-700 rounded-xl text-sm"/>
          <button type="submit" className="w-10 h-10 bg-gradient-to-r from-primary-600 to-primary-500 text-white rounded-xl flex items-center justify-center shadow-md shadow-primary-500/25 transition hover:shadow-lg"><i className="fas fa-paper-plane text-sm"></i></button>
        </form>
      </div>
    </div>
  </div>`;
}

function ProgressPage(){
  const{dark}=useContext(Ctx);
  const cRef=useRef(null),cInst=useRef(null);
  const[period,setPeriod]=useState('week');

  useEffect(()=>{
    if(!cRef.current)return;
    if(cInst.current)cInst.current.destroy();
    const data=period==='week'?SDATA.weekly:SDATA.weekly.map(v=>v+Math.round(Math.random()*40-20));
    const labels=period==='week'?['Mon','Tue','Wed','Thu','Fri','Sat','Sun']:['Wk 1','Wk 2','Wk 3','Wk 4','Wk 5','Wk 6','Wk 7'];
    const ctx2=cRef.current.getContext('2d');
    const g=ctx2.createLinearGradient(0,0,0,300);
    g.addColorStop(0,dark?'rgba(20,184,166,0.3)':'rgba(13,148,136,0.15)');
    g.addColorStop(1,dark?'rgba(20,184,166,0)':'rgba(13,148,136,0)');
    cInst.current=new Chart(ctx2,{type:'line',data:{labels,datasets:[{data,borderColor:'#0d9488',backgroundColor:g,fill:true,tension:.4,pointRadius:5,pointBackgroundColor:'#0d9488',pointBorderColor:dark?'#141e30':'#fff',pointBorderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:dark?'#8896ab':'#94a3b8'}},y:{grid:{color:dark?'rgba(255,255,255,.05)':'rgba(0,0,0,.05)'},ticks:{color:dark?'#8896ab':'#94a3b8',callback:v=>v+'m'}}}}});
    return()=>{if(cInst.current)cInst.current.destroy();};

  const miles=[{l:'Upload first document',d:true,i:'fa-cloud-upload-alt'},{l:'Generate first summary',d:true,i:'fa-compress-alt'},{l:'Create 10 flashcards',d:true,i:'fa-clone'},{l:'Complete 5 quizzes',d:true,i:'fa-check-double'},{l:'7-day study streak',d:true,i:'fa-fire'},{l:'Score 90%+ on a quiz',d:false,i:'fa-trophy'},{l:'Study 1000 total minutes',d:false,i:'fa-clock'}];

  return html`<div className="af space-y-6">

    <div className="grid sm:grid-cols-3 gap-4">
      <div className="bg-gradient-to-br from-orange-400 to-red-500 rounded-2xl p-6 text-white shadow-lg shadow-orange-500/20">
        <div className="flex items-center gap-3 mb-2"><i className="fas fa-fire text-2xl"></i><span className="text-sm font-semibold opacity-80">Current Streak</span></div>
        <div className="text-4xl font-extrabold">${SDATA.streak} days</div>
      </div>
      <div className="bg-white dark:bg-surface-800 rounded-2xl p-6 border border-gray-100 dark:border-gray-700/40 shadow-sm">
        <div className="text-sm text-gray-500 dark:text-gray-400 font-medium mb-1">This Week</div>
        <div className="text-3xl font-bold">${SDATA.weekly.reduce((a,b)=>a+b,0)}<span className="text-sm font-normal text-gray-400 ml-1">min</span></div>
        <div className="text-xs text-emerald-500 font-semibold mt-1"><i className="fas fa-arrow-up mr-1"></i>12% from last week</div>
      </div>
      <div className="bg-white dark:bg-surface-800 rounded-2xl p-6 border border-gray-100 dark:border-gray-700/40 shadow-sm">
        <div className="text-sm text-gray-500 dark:text-gray-400 font-medium mb-1">Avg Quiz Score</div>
        <div className="text-3xl font-bold">${Math.round(SDATA.scores.reduce((a,b)=>a+b,0)/SDATA.scores.length)}<span className="text-sm font-normal text-gray-400 ml-1">%</span></div>
        <div className="text-xs text-emerald-500 font-semibold mt-1"><i className="fas fa-arrow-up mr-1"></i>5% improvement</div>
      </div>
    </div>
    <div className="bg-white dark:bg-surface-800 rounded-2xl p-6 border border-gray-100 dark:border-gray-700/40 shadow-sm">
      <div className="flex items-center justify-between mb-4"><h3 className="font-semibold text-sm">Study Activity</h3>
        <div className="flex gap-2">${['week','month'].map(p=>html`<button key=${p} onClick=${()=>setPeriod(p)} className="px-3 py-1.5 rounded-lg text-xs font-semibold transition ${period===p?'bg-primary-600 text-white':'bg-gray-100 dark:bg-white/5 text-gray-500'}">${p==='week'?'This Week':'This Month'}</button>`)}</div>

      <div style=${{height:280}}><canvas ref=${cRef}/></div>

      <h3 className="font-semibold text-sm mb-4">Achievements</h3>

          <div className="w-9 h-9 rounded-xl flex items-center justify-center ${m.d?'bg-emerald-500 text-white':'bg-gray-200 dark:bg-gray-700 text-gray-400'}"><i className="fas ${m.d?'fa-check':m.i} text-sm"></i></div>

    </div>
    <div className="bg-white dark:bg-surface-800 rounded-2xl p-6 border border-gray-100 dark:border-gray-700/40 shadow-sm">
      <h3 className="font-semibold text-sm mb-4">Study Statistics</h3>
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
        ${[{l:'Documents',v:6,i:'fa-file-alt',c:'text-primary-500'},{l:'Flashcards',v:8,i:'fa-clone',c:'text-violet-500'},{l:'Quizzes',v:2,i:'fa-question-circle',c:'text-amber-500'},{l:'Hours',v:14,i:'fa-clock',c:'text-emerald-500'}].map((s,i)=>html`<div key=${i} className="text-center p-3 rounded-xl bg-gray-50 dark:bg-white/5"><i className="fas ${s.i} ${s.c} text-lg mb-2"></i><div className="text-xl font-bold">${s.v}</div><div className="text-xs text-gray-400 font-medium">${s.l}</div></div>`)}
      </div>
    </div>
    <div className="bg-white dark:bg-surface-800 rounded-2xl p-6 border border-gray-100 dark:border-gray-700/40 shadow-sm space-y-3">
      <h3 className="font-semibold text-sm mb-2">Account</h3>
      <button className="w-full text-left flex items-center gap-3 p-3 rounded-xl hover:bg-gray-50 dark:hover:bg-white/5 transition text-sm"><i className="fas fa-lock text-gray-400 w-5 text-center"></i>Change Password</button>
      <button className="w-full text-left flex items-center gap-3 p-3 rounded-xl hover:bg-gray-50 dark:hover:bg-white/5 transition text-sm"><i className="fas fa-bell text-gray-400 w-5 text-center"></i>Notification Preferences</button>
      <button className="w-full text-left flex items-center gap-3 p-3 rounded-xl hover:bg-gray-50 dark:hover:bg-white/5 transition text-sm"><i className="fas fa-download text-gray-400 w-5 text-center"></i>Export Data</button>
      <button className="w-full text-left flex items-center gap-3 p-3 rounded-xl hover:bg-red-50 dark:hover:bg-red-900/10 transition text-sm text-red-500"><i className="fas fa-sign-out-alt w-5 text-center"></i>Sign Out</button>
    </div>
  </div>`;
}

/* ── App ── */
function App(){
  const[user,setUser]=useState(()=>{try{const s=localStorage.getItem('sm_u');if(s)return JSON.parse(s);}catch(e){}return null;});
  const[dark,setDark]=useState(()=>{try{const s=localStorage.getItem('sm_d');if(s!==null)return JSON.parse(s);}catch(e){}return window.matchMedia('(prefers-color-scheme:dark)').matches;});
  const[docs,setDocs]=useState(DOCS);
  const[cards,setCards]=useState(CARDS);
  const[quizzes,setQuizzes]=useState(QUIZZES);
  const[cur,setCur]=useState('dashboard');
  const[col,setCol]=useState(true);
  const[toast,setToast]=useState(null);

  const addToast=useCallback((message,type)=>{setToast({message,type:type||'info',id:Date.now()});},[]);

  useEffect(()=>{try{localStorage.setItem('sm_u',JSON.stringify(user));}catch(e){}},[user]);
  useEffect(()=>{
    try{localStorage.setItem('sm_d',JSON.stringify(dark));}catch(e){}
    if(dark)document.documentElement.classList.add('dark');else document.documentElement.classList.remove('dark');
  },[dark]);
  useEffect(()=>{
    const el=document.getElementById('boot');
    if(el){el.classList.add('done');setTimeout(()=>{el.style.display='none';},700);}
  },[]);

  const ctx=useMemo(()=>({user,setUser,dark,setDark,docs,setDocs,cards,setCards,quizzes,setQuizzes,addToast}),[user,dark,docs,cards,quizzes,addToast]);

  if(!user)return html`<${Ctx.Provider} value=${ctx}><${AuthPage} /></${Ctx.Provider}>`;

  const pages={dashboard:Dashboard,upload:UploadPage,documents:DocsPage,summarize:SummarizePage,flashcards:FlashcardsPage,quiz:QuizPage,chat:ChatPage,progress:ProgressPage,profile:ProfilePage};
  const Page=pages[cur]||Dashboard;

  return html`<${Ctx.Provider} value=${ctx}>
    <div className="flex min-h-screen">
      <${Sidebar} cur=${cur} setCur=${setCur} col=${col} setCol=${setCol} />
      <div className="flex-1 transition-all duration-300 ${col?'lg:ml-20':'lg:ml-64'}">
        <${TopBar} setCol=${setCol} />
        <main className="p-4 lg:p-6 max-w-7xl mx-auto">
          <${Page} setCur=${setCur} />
        </main>
      </div>
    </div>
    ${toast&&html`<${Toast} key=${toast.id} message=${toast.message} type=${toast.type} onClose=${()=>setToast(null)} />`}
  </${Ctx.Provider}>`;
}

ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);

</script>
</body>
</html>
